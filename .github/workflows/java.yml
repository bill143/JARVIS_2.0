name: java

on:
  push:
    branches: [main]
    paths:
      - "java/**"
      - ".github/workflows/java.yml"
  pull_request:
    paths:
      - "java/**"
      - ".github/workflows/java.yml"

concurrency:
  group: java-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: java/**/pom.xml

      - name: Build and test (Maven)
        run: |
          chmod +x mvnw
          ./mvnw -B --no-transfer-progress clean test
